<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>매물관리 시스템</title>
<style>
/* 전체 스타일 */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#fafafa;color:#1a1a1a}
.container{max-width:480px;margin:0 auto;background:#fff;min-height:100vh}
.header{background:#1976d2;color:#fff;padding:14px 16px;text-align:center;font-weight:700;font-size:16px}

/* 탭 메뉴 스타일 */
.tabs{display:flex;background:#f5f5f5;border-bottom:1px solid #ddd}
.tab{flex:1;padding:12px 8px;text-align:center;background:transparent;border:none;font-size:13px;font-weight:500;cursor:pointer;color:#666;transition:all 0.2s}
.tab.active{background:#1976d2;color:#fff}
.tab-content{display:none;padding:16px}
.tab-content.active{display:block}

/* 폼 스타일 */
.form-group{margin-bottom:14px}
.fl{display:block;font-size:13px;font-weight:500;margin-bottom:6px;color:#1a1a1a}
.fi{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px}
.fi:focus{outline:none;border-color:#1976d2;box-shadow:0 0 0 2px rgba(25,118,210,0.1)}
select.fi{height:42px}
textarea.fi{resize:vertical;min-height:80px;font-family:inherit}

/* 버튼 스타일 */
.btn-p{background:#1976d2;color:#fff;border:none;padding:12px 20px;border-radius:8px;font-weight:600;cursor:pointer;width:100%;font-size:14px}
.btn-p:hover{background:#1565c0}
.btn-s{background:#f5f5f5;color:#1a1a1a;border:1px solid #ddd;padding:8px 16px;border-radius:6px;font-size:12px;cursor:pointer}
.btn-s:hover{background:#eee}

/* 매물 리스트 스타일 */
.prop-list{padding:0}
.prop-item{background:#fff;border-bottom:1px solid #f0f0f0;padding:14px;position:relative}
.prop-item:hover{background:#f8f9fa}
.prop-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.prop-badges{display:flex;gap:4px}
.badge{font-size:10px;padding:3px 8px;border-radius:12px;font-weight:600}
.badge.apt{background:#e8f5e9;color:#1a7f3c}
.badge.sale{background:#fff3e0;color:#e65100}
.badge.rent{background:#e3f2fd;color:#1976d2}
.badge.active{background:#e8f5e9;color:#2e7d32}
.badge.complete{background:#f3e5f5;color:#7b1fa2}
.badge.hold{background:#fff8e1;color:#f57f17}
.prop-name{font-size:15px;font-weight:700;margin-bottom:4px}
.prop-info{font-size:12px;color:#666;margin-bottom:8px}
.prop-price{font-size:14px;font-weight:700;color:#e65100}

/* 사진 업로드 스타일 */
.photo-upload{border:2px dashed #ddd;border-radius:8px;padding:20px;text-align:center;cursor:pointer;margin-bottom:14px;transition:all 0.2s}
.photo-upload:hover,.photo-upload.dragover{border-color:#1976d2;background:#f8f9fa}
.photo-preview{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px;margin-top:12px}
.photo-item{position:relative;aspect-ratio:1;border-radius:6px;overflow:hidden}
.photo-item img{width:100%;height:100%;object-fit:cover}
.photo-remove{position:absolute;top:2px;right:2px;background:rgba(0,0,0,0.7);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:12px;cursor:pointer}

/* 로고 워터마크 설정 */
.watermark-settings{background:#f8f9fa;padding:14px;border-radius:8px;margin-bottom:14px}
.watermark-settings h4{font-size:14px;margin-bottom:10px;color:#1976d2}
.setting-row{display:flex;gap:10px;margin-bottom:10px;align-items:center}
.setting-row label{font-size:12px;min-width:60px}
.setting-row select,.setting-row input{flex:1;padding:6px 8px;border:1px solid #ddd;border-radius:4px;font-size:12px}
.opacity-value{min-width:40px;text-align:center;font-size:12px;color:#666}

/* 모달 스타일 */
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center}
.modal-content{background:#fff;border-radius:12px;padding:20px;max-width:400px;width:calc(100%-32px)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-title{font-size:16px;font-weight:700}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:#999}

/* 유틸리티 클래스 */
.hidden{display:none}
.text-center{text-align:center}
.text-right{text-align:right}
.mt-1{margin-top:8px}
.mb-1{margin-bottom:8px}
.p-1{padding:8px}
</style>
</head>
<body>
<div class="container">
  <!-- 헤더 -->
  <div class="header">
    <h1>매물관리 시스템</h1>
  </div>

  <!-- 탭 메뉴 -->
  <div class="tabs">
    <button class="tab active" onclick="showTab('list')">매물목록</button>
    <button class="tab" onclick="showTab('add')">매물등록</button>
    <button class="tab" onclick="showTab('photos')">사진관리</button>
    <button class="tab" onclick="showTab('settings')">설정</button>
  </div>

  <!-- 매물목록 탭 -->
  <div id="list-tab" class="tab-content active">
    <div class="prop-list" id="propList">
      <!-- 매물 아이템들이 여기에 동적으로 추가됩니다 -->
    </div>
  </div>

  <!-- 매물등록 탭 -->
  <div id="add-tab" class="tab-content">
    <form id="propForm">
      <div class="form-group">
        <label class="fl">매물유형</label>
        <select class="fi" id="propType" required>
          <option value="">선택하세요</option>
          <option value="아파트">아파트</option>
          <option value="오피스텔">오피스텔</option>
          <option value="상가">상가</option>
        </select>
      </div>
      
      <div class="form-group">
        <label class="fl">거래유형</label>
        <select class="fi" id="dealType" required>
          <option value="">선택하세요</option>
          <option value="매매">매매</option>
          <option value="전세">전세</option>
          <option value="월세">월세</option>
        </select>
      </div>

      <div class="form-group">
        <label class="fl">단지명/건물명</label>
        <input type="text" class="fi" id="propName" placeholder="예: 송도센트럴파크푸르지오" required>
      </div>

      <div class="form-group">
        <label class="fl">주소</label>
        <input type="text" class="fi" id="propAddr" placeholder="예: 인천광역시 연수구..." required>
      </div>

      <div class="form-group">
        <label class="fl">동/호수</label>
        <div style="display:flex;gap:8px">
          <input type="text" class="fi" id="propDong" placeholder="동" style="flex:1">
          <input type="text" class="fi" id="propHo" placeholder="호" style="flex:1">
        </div>
      </div>

      <div class="form-group">
        <label class="fl">면적 (㎡)</label>
        <input type="number" class="fi" id="propArea" placeholder="예: 84">
      </div>

      <div class="form-group">
        <label class="fl">층/향</label>
        <div style="display:flex;gap:8px">
          <input type="text" class="fi" id="propFloor" placeholder="층" style="flex:1">
          <input type="text" class="fi" id="propDirection" placeholder="향" style="flex:1">
        </div>
      </div>

      <div class="form-group">
        <label class="fl">가격</label>
        <input type="text" class="fi" id="propPrice" placeholder="예: 5억 또는 전세 4억" required>
      </div>

      <div class="form-group">
        <label class="fl">연락처</label>
        <div style="display:flex;gap:8px">
          <input type="text" class="fi" id="contact1" placeholder="주연락처" style="flex:1">
          <input type="text" class="fi" id="contact2" placeholder="보조연락처" style="flex:1">
        </div>
      </div>

      <div class="form-group">
        <label class="fl">메모</label>
        <textarea class="fi" id="propMemo" placeholder="특이사항, 주요 정보 등"></textarea>
      </div>

      <button type="submit" class="btn-p">매물 등록</button>
    </form>
  </div>

  <!-- 사진관리 탭 -->
  <div id="photos-tab" class="tab-content">
    <div class="watermark-settings">
      <h4>🏢 로고 워터마크 설정</h4>
      <div class="setting-row">
        <label>로고선택:</label>
        <select id="logoSelect">
          <option value="">선택하세요</option>
          <option value="1">사무실번호 (032-851-6688)</option>
          <option value="2">상가전문 + 사무실번호</option>
          <option value="3">휴대폰번호 (010-6401-9345)</option>
          <option value="4">전화번호 조합</option>
        </select>
      </div>
      <div class="setting-row">
        <label>투명도:</label>
        <input type="range" id="logoOpacity" min="10" max="100" value="80" step="5">
        <span class="opacity-value">80%</span>
      </div>
      <div class="setting-row">
        <label>위치:</label>
        <select id="logoPosition">
          <option value="bottom-right">우하단</option>
          <option value="bottom-left">좌하단</option>
          <option value="top-right">우상단</option>
          <option value="top-left">좌상단</option>
          <option value="center">중앙</option>
        </select>
      </div>
    </div>

    <div class="photo-upload" id="photoUpload">
      <div>📸 사진을 드래그하거나 클릭하여 업로드</div>
      <div style="font-size:12px;color:#666;margin-top:4px">JPG, PNG 파일만 가능</div>
      <input type="file" id="photoInput" multiple accept="image/*" style="display:none">
    </div>
    
    <div class="photo-preview" id="photoPreview"></div>
  </div>

  <!-- 설정 탭 -->
  <div id="settings-tab" class="tab-content">
    <div class="form-group">
      <label class="fl">백업/내보내기</label>
      <button class="btn-s" onclick="exportData()" style="width:100%;margin-bottom:8px">데이터 내보내기</button>
      <button class="btn-s" onclick="importData()" style="width:100%">데이터 가져오기</button>
      <input type="file" id="importInput" accept=".json" style="display:none">
    </div>
    
    <div class="form-group">
      <label class="fl">데이터 관리</label>
      <button class="btn-s" onclick="clearData()" style="width:100%;background:#ffebee;color:#c62828;border-color:#ffcdd2">전체 데이터 삭제</button>
    </div>
  </div>
</div>

let properties = JSON.parse(localStorage.getItem('songdo-properties') || '[]');

// 로고 설명
const LOGO_DESCRIPTIONS = {
  "1": "사무실번호 (032-851-6688)",
  "2": "상가전문 + 사무실번호", 
  "3": "휴대폰번호 (010-6401-9345)",
  "4": "전화번호 조합"
};

// 탭 전환
function showTab(tabName) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  
  document.querySelector(`[onclick="showTab('${tabName}')"]`).classList.add('active');
  document.getElementById(`${tabName}-tab`).classList.add('active');
  
  if (tabName === 'list') {
    renderProperties();
  }
}

// 매물 데이터 저장
function saveProperties() {
  localStorage.setItem('songdo-properties', JSON.stringify(properties));
}

// 매물 목록 렌더링
function renderProperties() {
  const container = document.getElementById('propList');
  
  if (properties.length === 0) {
    container.innerHTML = `
      <div style="text-align:center;padding:40px;color:#666">
        <div style="font-size:48px;margin-bottom:16px">📋</div>
        <div>등록된 매물이 없습니다</div>
        <div style="font-size:12px;margin-top:8px">매물등록 탭에서 새 매물을 추가해보세요</div>
      </div>
    `;
    return;
  }
  
  container.innerHTML = properties.map((prop, index) => `
    <div class="prop-item" onclick="showPropertyDetail(${index})">
      <div class="prop-header">
        <div class="prop-badges">
          <span class="badge apt">${prop.type}</span>
          <span class="badge ${prop.dealType === '매매' ? 'sale' : 'rent'}">${prop.dealType}</span>
          <span class="badge active">진행중</span>
        </div>
      </div>
      <div class="prop-name">${prop.name}</div>
      <div class="prop-info">${prop.addr}</div>
      <div class="prop-info">${prop.dong}동 ${prop.ho}호 · ${prop.area}㎡ · ${prop.floor}층 ${prop.direction}향</div>
      <div class="prop-price">${prop.price}</div>
      ${prop.photos && prop.photos.length > 0 ? `<div style="font-size:11px;color:#666;margin-top:4px">📷 사진 ${prop.photos.length}장</div>` : ''}
    </div>
  `).join('');
}

// 매물 상세보기
function showPropertyDetail(index) {
  const prop = properties[index];
  alert(`매물 상세 정보\n\n${prop.name}\n${prop.addr}\n${prop.dong}동 ${prop.ho}호\n${prop.area}㎡, ${prop.floor}층 ${prop.direction}향\n${prop.price}\n\n연락처: ${prop.contact1}${prop.contact2 ? ', ' + prop.contact2 : ''}\n\n메모: ${prop.memo || '없음'}`);
}

// 매물 등록 폼 제출
document.getElementById('propForm').addEventListener('submit', function(e) {
  e.preventDefault();
  
  const formData = {
    type: document.getElementById('propType').value,
    dealType: document.getElementById('dealType').value,
    name: document.getElementById('propName').value,
    addr: document.getElementById('propAddr').value,
    dong: document.getElementById('propDong').value,
    ho: document.getElementById('propHo').value,
    area: document.getElementById('propArea').value,
    floor: document.getElementById('propFloor').value,
    direction: document.getElementById('propDirection').value,
    price: document.getElementById('propPrice').value,
    contact1: document.getElementById('contact1').value,
    contact2: document.getElementById('contact2').value,
    memo: document.getElementById('propMemo').value,
    photos: uploadedPhotos.slice(),
    createdAt: new Date().toISOString()
  };
  
  properties.push(formData);
  saveProperties();
  
  // 폼 초기화
  this.reset();
  uploadedPhotos = [];
  renderPhotoPreviews();
  
  alert('매물이 등록되었습니다!');
  showTab('list');
});

// 사진 업로드 관련
function initPhotoUpload() {
  const uploadArea = document.getElementById('photoUpload');
  const fileInput = document.getElementById('photoInput');
  
  uploadArea.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', handleFileSelect);
  
  // 드래그 앤 드롭
  uploadArea.addEventListener('dragover', e => {
    e.preventDefault();
    uploadArea.classList.add('dragover');
  });
  
  uploadArea.addEventListener('dragleave', () => {
    uploadArea.classList.remove('dragover');
  });
  
  uploadArea.addEventListener('drop', e => {
    e.preventDefault();
    uploadArea.classList.remove('dragover');
    handleFileSelect({target: {files: e.dataTransfer.files}});
  });
  
  // 투명도 슬라이더
  document.getElementById('logoOpacity').addEventListener('input', function() {
    document.querySelector('.opacity-value').textContent = this.value + '%';
  });
}

// 파일 선택 처리
function handleFileSelect(e) {
  const files = Array.from(e.target.files);
  
  files.forEach(file => {
    if (file.type.startsWith('image/')) {
      const reader = new FileReader();
      reader.onload = function(event) {
        processImageWithWatermark(event.target.result, file.name);
      };
      reader.readAsDataURL(file);
    }
  });
}

// 워터마크 적용 함수
function processImageWithWatermark(imageSrc, fileName) {
  const logoSelect = document.getElementById('logoSelect').value;
  
  if (!logoSelect) {
    // 로고 미선택시 원본 저장
    uploadedPhotos.push({
      src: imageSrc,
      name: fileName,
      timestamp: Date.now()
    });
    renderPhotoPreviews();
    return;
  }
  
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  const img = new Image();
  
  img.onload = function() {
    // 캔버스 크기 설정 (원본 크기 유지)
    canvas.width = img.width;
    canvas.height = img.height;
    
    // 원본 이미지 그리기
    ctx.drawImage(img, 0, 0);
    
    // 로고 이미지 로드 및 적용
    const logoImg = new Image();
    logoImg.onload = function() {
      const logoOpacity = document.getElementById('logoOpacity').value / 100;
      const logoPosition = document.getElementById('logoPosition').value;
      
      // 로고 크기 계산 (원본 이미지 너비의 20% 정도)
      const logoWidth = Math.min(300, img.width * 0.2);
      const logoHeight = (logoWidth * logoImg.height) / logoImg.width;
      
      // 위치 계산
      let x, y;
      const margin = 20;
      
      switch(logoPosition) {
        case 'top-left':
          x = margin;
          y = margin;
          break;
        case 'top-right':
          x = img.width - logoWidth - margin;
          y = margin;
          break;
        case 'bottom-left':
          x = margin;
          y = img.height - logoHeight - margin;
          break;
        case 'center':
          x = (img.width - logoWidth) / 2;
          y = (img.height - logoHeight) / 2;
          break;
        default: // bottom-right
          x = img.width - logoWidth - margin;
          y = img.height - logoHeight - margin;
      }
      
      // 투명도 적용하여 로고 그리기
      ctx.globalAlpha = logoOpacity;
      ctx.drawImage(logoImg, x, y, logoWidth, logoHeight);
      ctx.globalAlpha = 1.0;
      
      // 결과 이미지를 업로드된 사진으로 저장
      const watermarkedImageSrc = canvas.toDataURL('image/jpeg', 0.9);
      uploadedPhotos.push({
        src: watermarkedImageSrc,
        name: fileName + '_watermarked',
        timestamp: Date.now()
      });
      renderPhotoPreviews();
    };
    
    logoImg.src = LOGO_DATA[logoSelect];
  };
  
  img.src = imageSrc;
}

// 사진 미리보기 렌더링
function renderPhotoPreviews() {
  const container = document.getElementById('photoPreview');
  
  container.innerHTML = uploadedPhotos.map((photo, index) => `
    <div class="photo-item">
      <img src="${photo.src}" alt="${photo.name}">
      <button class="photo-remove" onclick="removePhoto(${index})">×</button>
    </div>
  `).join('');
}

// 사진 삭제
function removePhoto(index) {
  uploadedPhotos.splice(index, 1);
  renderPhotoPreviews();
}

// 데이터 내보내기
function exportData() {
  const data = {
    properties: properties,
    exportDate: new Date().toISOString(),
    version: '1.0'
  };
  
  const dataStr = JSON.stringify(data, null, 2);
  const dataBlob = new Blob([dataStr], {type: 'application/json'});
  
  const link = document.createElement('a');
  link.href = URL.createObjectURL(dataBlob);
  link.download = `songdo-properties-${new Date().toISOString().split('T')[0]}.json`;
  link.click();
}

// 데이터 가져오기
function importData() {
  document.getElementById('importInput').click();
}

// 전체 데이터 삭제
function clearData() {
  if (confirm('정말로 모든 데이터를 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.')) {
    properties = [];
    uploadedPhotos = [];
    localStorage.removeItem('songdo-properties');
    renderProperties();
    renderPhotoPreviews();
    alert('모든 데이터가 삭제되었습니다.');
  }
}

// 페이지 로드시 초기화
document.addEventListener('DOMContentLoaded', function() {
  initPhotoUpload();
  renderProperties();
  
  // 가져오기 파일 선택
  document.getElementById('importInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = function(event) {
        try {
          const data = JSON.parse(event.target.result);
          if (data.properties && Array.isArray(data.properties)) {
            properties = data.properties;
            saveProperties();
            renderProperties();
            alert('데이터를 성공적으로 가져왔습니다!');
          } else {
            alert('올바르지 않은 데이터 형식입니다.');
          }
        } catch (error) {
          alert('파일을 읽는 중 오류가 발생했습니다.');
        }
      };
      reader.readAsText(file);
    }
  });
});
</script>
